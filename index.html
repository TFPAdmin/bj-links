<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LSUN Links</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 72 72%22><text y=%22.9em%22 font-size=%2272%22>🔗</text></svg>">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sidebar">
    <h2>Corey's LSUN Links</h2>
    <h3 class="sidebar-heading">Sections</h3>

    <!-- Site-wide search UI -->
    <div class="site-search">
      <input id="siteSearchInput" type="search" placeholder="Search links…" autocomplete="off" />
      <div id="siteSearchResults" class="site-search-results" hidden></div>
    </div>

    <nav>
      <a href="#gen">General</a>
      <a href="#misc">Misc Links</a>
    </nav>
  </div>

  <!-- This wrapper was missing; it fixes the squished layout -->
  <main class="content">
    <section id="gen">
      <h2>General Links</h2>
      <div class="link-grid">
      <a href="https://workforcenow.adp.com" target="_blank" rel="noopener">ADP</a> 
      <a href="https://outlook.office.com" target="_blank" rel="noopener">Email</a> 
      <a href="https://brownjugak-prod.operations.dynamics.com/?cmp=001&mi=DefaultDashboard" target="_blank" rel="noopener">F&O</a> 
      <a href="https://thinklp-14.my.salesforce-sites.com/ThinkLP__SitePortal" target="_blank" rel="noopener">Think LP</a> 
      <a href="https://app.powerbi.com/groups/me/apps/7bf27b0f-451c-4cab-ba07-e1ba9399f766/reports/87cde7e0-cc7d-40f7-b462-2b655c7c26fc/ReportSectionaa5b580dac8193467c88?ctid=b43fd36f-f604-4027-a777-1c8bd5731bd0&experience=power-bi" target="_blank" rel="noopener">BI</a> 
      <a href="https://afognakc.sharepoint.com/sites/TheCache" target="_blank" rel="noopener">The Cache</a> 
      </div>
    </section>
     <section id="misc">
      <h2>Misc Links</h2>
      <div class="link-grid">
      <a href="https://my.alutiiq.com" target="_blank" rel="noopener">My Alutiiq</a>
      <a href="https://count.alyeska.xyz" target="_blank" rel="noopener">Counting Tool</a>
      <a href="https://workforcenow.adp.com/mascsr/default/mdf/recruitment/recruitment.html?cid=86ff216d-5783-48bd-b4c9-3f138a312565&ccId=19000101_000001&lang=en_US" target="_blank" rel="noopener">Jobs</a> 
      </div>
    </section>
  </main>

  <script src="/search.js" defer></script>
  <script>
    // Sidebar section highlight (unchanged)
    document.querySelectorAll('.sidebar nav a[href^="#"]').forEach(link => {
      link.addEventListener('click', function () {
        const targetId = this.getAttribute('href').substring(1);
        const targetElement = document.getElementById(targetId);
        if (targetElement) {
          targetElement.classList.remove('section-highlight');
          void targetElement.offsetWidth; // restart animation
          targetElement.classList.add('section-highlight');
        }
      });
    });

    // Open link-grid anchors in a background tab without switching focus.
    // Note: Browsers ultimately control focus behavior; this is the closest reliable approach.
    document.querySelectorAll('.link-grid a').forEach(a => {
      // Ensure security best-practice
      if (!a.hasAttribute('rel')) a.setAttribute('rel', 'noopener');

      a.addEventListener('click', (e) => {
        // Let users use modifiers like Cmd/Ctrl/Shift or middle-click as usual
        if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return;

        e.preventDefault();
        // Opens a new tab with noopener/noreferrer; most browsers keep focus on current tab
        window.open(a.href, '_blank', 'noopener,noreferrer');
      });
    });
  </script>
</body>
</html>
